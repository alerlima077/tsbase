<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Atualizar Pedidos - TS Base</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            background: #0a0a1a;
            color: #eee;
            font-family: monospace;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #1a1a2e;
            padding: 30px;
            border-radius: 16px;
        }
        button {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover { background: #e85d2a; }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #2c2c2c;
        }
        .success { color: #4caf50; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Atualizar Pedidos</h1>
        <p>Este script vai adicionar o campo <strong>empresaId</strong> em todos os pedidos.</p>
        <p><strong>⚠️ Execute apenas UMA vez!</strong></p>
        <button onclick="executar()">▶️ Executar Atualização</button>
        <div id="status">Clique no botão para começar...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8uUzNpj3RLdoVZoHqd61zGMxsm5KHbL8",
            authDomain: "imperio-pizzas.firebaseapp.com",
            projectId: "imperio-pizzas",
            storageBucket: "imperio-pizzas.firebasestorage.app",
            messagingSenderId: "177187165049",
            appId: "1:177187165049:web:c0419e4fc621cd2621d5a8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.executar = async function() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '🔄 Buscando pedidos...';
            statusDiv.className = '';
            
            try {
                // Buscar todos os pedidos
                const snapshot = await db.collection('pedidos').get();
                const totalPedidos = snapshot.size;
                
                if (totalPedidos === 0) {
                    statusDiv.innerHTML = '📭 Nenhum pedido encontrado para atualizar.';
                    return;
                }
                
                statusDiv.innerHTML = `📦 Encontrados ${totalPedidos} pedidos. Atualizando...`;
                
                let atualizados = 0;
                let jaTinham = 0;
                
                for (const doc of snapshot.docs) {
                    const data = doc.data();
                    
                    // Verificar se já tem empresaId
                    if (!data.empresaId) {
                        await db.collection('pedidos').doc(doc.id).update({
                            empresaId: 'pizzaria'
                        });
                        atualizados++;
                        statusDiv.innerHTML = `🔄 Atualizando... (${atualizados} de ${totalPedidos})`;
                    } else {
                        jaTinham++;
                    }
                }
                
                statusDiv.innerHTML = `✅ CONCLUÍDO!<br><br>📝 ${atualizados} pedidos atualizados<br>📌 ${jaTinham} pedidos já tinham empresaId<br>🎯 Total: ${totalPedidos} pedidos`;
                statusDiv.className = 'success';
                
            } catch (error) {
                statusDiv.innerHTML = `❌ ERRO: ${error.message}<br><br>Verifique se você está logado no Firebase e as regras estão corretas.`;
                statusDiv.className = 'error';
                console.error(error);
            }
        }
    </script>
</body>
</html>
